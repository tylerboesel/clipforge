version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING}
      - REDIS_URL=redis://redis:6379
      - STORAGE_DIR=/app/storage
      - FRONTEND_URL=http://localhost:5173
    volumes:
      - ./storage:/app/storage
    depends_on:
      - redis

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    command: node src/workers/clipWorker.js
    restart: unless-stopped
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING}
      - REDIS_URL=redis://redis:6379
      - STORAGE_DIR=/app/storage
      - WORKER_CONCURRENCY=2
    volumes:
      - ./storage:/app/storage
    depends_on:
      - redis
      - backend

  frontend:
      build: ./frontend
      ports:
        - "5173:80"
      depends_on:
        - backend

volumes:
  redis_data: